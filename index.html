<!DOCTYPE html>
<html>

<head lang="en">
    <meta charset="utf-8">
    <title>My reborn car</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <style>
        body {
            font-family: Monospace;
            background-color: #000;
            color: #fff;
            margin: 0px;
            overflow: hidden;
        }

        #info {
            color: #fff;
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            z-index: 100;
            display: block;
        }

        #info a {
            color: #046;
            font-weight: bold;
        }

        .progress-bar-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #progress-bar {
            width: 30%;
            margin-top: 0.5%;
            height: 2%;
        }

        label {
            color: white;
            font-size: 2rem;
        }

        #page-controls {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.25rem;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.55);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            font-family: Monospace, monospace;
            font-size: 0.9rem;
            color: #fff;
            user-select: none;
        }

        #page-controls label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            cursor: pointer;
        }

        #page-controls input[type="checkbox"] {
            width: 1rem;
            height: 1rem;
            cursor: pointer;
        }

        #page-controls select {
            font-family: Monospace, monospace;
            font-size: 0.9rem;
            padding: 6px 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 4px;
            cursor: pointer;
        }

        #page-controls .control-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        #page-controls .control-group label {
            cursor: default;
        }

        #page-controls button {
            font-family: Monospace, monospace;
            font-size: 0.9rem;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 4px;
            cursor: pointer;
        }

        #page-controls button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        #page-controls .drive-hint {
            font-size: 0.75rem;
            opacity: 0.65;
            cursor: default;
        }

        #page-controls .mode-switch {
            display: flex;
            gap: 0;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 4px;
            overflow: hidden;
        }

        #page-controls .mode-btn {
            border: none;
            border-radius: 0;
            background: rgba(255, 255, 255, 0.08);
        }

        #page-controls .mode-btn.active {
            background: rgba(255, 255, 255, 0.28);
        }

        #page-controls .mode-panel {
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }

        #page-controls .mode-panel[hidden] {
            display: none !important;
        }

        #compass {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 90;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
            user-select: none;
        }

        #compass[hidden] {
            display: none !important;
        }

        #compass .compass-dial {
            position: relative;
            width: 88px;
            height: 88px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.35);
            background: rgba(0, 0, 0, 0.45);
            box-sizing: border-box;
        }

        #compass .compass-dial span {
            position: absolute;
            font-size: 0.75rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
            line-height: 1;
        }

        #compass .compass-n {
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            color: #f0c8a0;
        }

        #compass .compass-s {
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
        }

        #compass .compass-e {
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
        }

        #compass .compass-w {
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
        }

        #compass .compass-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            margin: -3px 0 0 -3px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.7);
        }

        #compass .drive-location {
            min-width: 118px;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(0, 0, 0, 0.45);
            font-size: 0.68rem;
            line-height: 1.45;
            color: rgba(255, 255, 255, 0.92);
            text-align: center;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        }

        #compass .drive-location .drive-loc-heading {
            margin-top: 5px;
            font-size: 0.58rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
        }

        #compass .drive-location .drive-loc-heading:first-child {
            margin-top: 0;
        }

        #compass .drive-location .drive-loc-speed {
            margin-top: 4px;
            color: #f0c8a0;
            font-weight: bold;
        }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@v0.157.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@v0.157.0/examples/jsm/" } }
    </script>
</head>

<body>
    <div id="info">
        <a href="http://threejs.org" target="_blank" rel="noopener">three.js</a> - carGo
        <br /> By <a href="xxx" target="_blank" rel="noopener">AlexWoon</a>
    </div>

    <div class="progress-bar-container">
        <label for="progress-bar">Loading...
            <span id="progress-bar-value"></span>
        </label>
        <progress id="progress-bar" value="0" max="100"></progress>
    </div>

    <div id="page-controls">
        <div class="mode-switch">
            <button type="button" id="mode-inspect" class="mode-btn active">Inspect</button>
            <button type="button" id="mode-drive" class="mode-btn">Drive</button>
        </div>
        <div id="inspect-controls" class="mode-panel">
        <div class="control-group">
            <label for="paint-preset">Paint preset</label>
            <select id="paint-preset" aria-label="Paint preset"></select>
        </div>
        <label for="camera-rotate">
            <input type="checkbox" id="camera-rotate" />
            Rotate car
        </label>
        <button type="button" id="screenshot-btn">Screenshot</button>
        </div>
        <div id="drive-controls" class="mode-panel" hidden>
            <span class="drive-hint">WASD / arrows to drive · scroll zoom · drag to orbit camera</span>
            <button type="button" id="screenshot-btn-drive">Screenshot</button>
        </div>
    </div>
    <div id="compass" hidden aria-hidden="true">
        <div class="compass-dial">
            <span class="compass-n">N</span>
            <span class="compass-e">E</span>
            <span class="compass-s">S</span>
            <span class="compass-w">W</span>
            <span class="compass-center"></span>
        </div>
        <div id="drive-location" class="drive-location" aria-live="polite">
            <div class="drive-loc-heading">Car</div>
            <div>X <span id="drive-loc-x">0</span></div>
            <div>Y <span id="drive-loc-y">0</span></div>
            <div>Z <span id="drive-loc-z">0</span></div>
            <div class="drive-loc-heading">Ground</div>
            <div>X <span id="ground-loc-x">0</span></div>
            <div>Y <span id="ground-loc-y">0</span></div>
            <div>Z <span id="ground-loc-z">0</span></div>
            <div class="drive-loc-heading">Ripple</div>
            <div>X <span id="ripple-loc-x">—</span></div>
            <div>Z <span id="ripple-loc-z">—</span></div>
            <div class="drive-loc-heading">Camera</div>
            <div>X <span id="camera-loc-x">0</span></div>
            <div>Y <span id="camera-loc-y">0</span></div>
            <div>Z <span id="camera-loc-z">0</span></div>
            <div class="drive-loc-speed"><span id="drive-loc-speed">0</span> km/h</div>
        </div>
    </div>
    <script type="module" src="./car_main.js"></script>
</body>

</html>
